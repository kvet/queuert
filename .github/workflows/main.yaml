name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  combined-checks:
    name: Checks
    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-repo

      - name: Format check
        run: pnpm fmt:check

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Examples
        run: pnpm examples

      - name: Benchmarks
        run: pnpm benchmarks

  # PR CHECKS

  required-collector-job:
    needs: [combined-checks]
    if: github.event_name == 'pull_request' && always()

    name: Required Checks
    runs-on: ubuntu-latest
    steps:
      - name: Check for failures
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: echo "One of the dependent jobs have failed. You may need to re-run it." && exit 1

  # END PR CHECKS
