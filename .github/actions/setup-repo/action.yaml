name: Setup repo
description: Installs dependencies and prepares the environment for execution

inputs:
  node-version:
    description: Node.js version to install (overrides .nvmrc if set)
    required: false
    default: ""
  registry-url:
    description: npm registry URL for authentication (used for publishing)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2
      name: Install bun

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        node-version-file: ${{ inputs.node-version == '' && '.nvmrc' || '' }}
        registry-url: ${{ inputs.registry-url || '' }}

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
